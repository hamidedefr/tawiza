groups:
  - name: mptoo-backend
    rules:
      - alert: BackendDown
        expr: up{job="tajine-agent"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MPtoO backend is down"
          description: "The tajine-agent target has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{job="tajine-agent", status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="tajine-agent"}[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate ({{ $value | humanizePercentage }})"
          description: "More than 5% of requests are returning 5xx errors over the last 5 minutes."

      - alert: SlowAPIResponse
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="tajine-agent"}[5m])) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow API responses (P95 > 3s)"
          description: "The 95th percentile response time is {{ $value | humanizeDuration }}."

  - name: mptoo-infrastructure
    rules:
      - alert: HighMemoryUsage
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }} ({{ $value | humanizePercentage }})"
          description: "Memory usage has been above 85% for 5 minutes."

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage has been above 90% for 10 minutes."

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Less than 10% disk space remaining on root filesystem."
