name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v2.0.4)'
        required: true
        type: string

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pip install pytest pytest-asyncio pytest-cov
          pytest tests/ -v --cov=src --cov-report=xml

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configuration: |
            {
              "categories": [
                {
                  "title": "## 🚀 Features",
                  "labels": ["feature", "enhancement"]
                },
                {
                  "title": "## 🐛 Bug Fixes",
                  "labels": ["bug", "fix"]
                },
                {
                  "title": "## 📚 Documentation",
                  "labels": ["documentation", "docs"]
                },
                {
                  "title": "## 🔧 Maintenance",
                  "labels": ["chore", "dependencies"]
                },
                {
                  "title": "## 🔒 Security",
                  "labels": ["security"]
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            # MPtoO ${{ github.ref_name }}

            ${{ steps.changelog.outputs.changelog }}

            ## 📦 Installation

            ```bash
            # Clone the repository
            git clone https://github.com/${{ github.repository }}.git
            cd MPtoO-V2
            git checkout ${{ github.ref_name }}

            # Install dependencies
            python -m venv venv
            source venv/bin/activate
            pip install -r requirements.txt

            # Start services
            docker-compose up -d

            # Run migrations
            alembic upgrade head

            # Start API
            uvicorn src.interfaces.api.main:app --host 0.0.0.0 --port 8000
            ```

            ## 🔗 Links

            - [Documentation](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/README.md)
            - [CLI Guide](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/cli/QUICK-START-CLI.md)
            - [Docker Image](https://ghcr.io/${{ github.repository }}:${{ github.ref_name }})

            ## ✨ What's New

            Check the changelog above for detailed changes.

            ---

            **Full Changelog**: https://github.com/${{ github.repository }}/compare/v2.0.3...${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Build Python package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
