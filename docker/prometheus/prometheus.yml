global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'mptoo-monitor'

scrape_configs:
  # MPtoO API metrics
  - job_name: 'mptoo-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'

  # MLflow metrics
  - job_name: 'mlflow'
    static_configs:
      - targets: ['mlflow:5000']

  # vLLM metrics (if deployed)
  - job_name: 'vllm'
    static_configs:
      - targets: ['vllm:8000']
    metrics_path: '/metrics'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node exporter (system metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
