apiVersion: 1

datasources:
  # Prometheus datasource
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: 15s
      queryTimeout: 60s
      httpMethod: POST
    editable: true
    version: 1

  # Loki datasource
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    jsonData:
      maxLines: 1000
      timeout: 60s
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: "trace_id=(\\w+)"
          name: TraceID
          url: "$${__value.raw}"
    editable: true
    version: 1

  # OpenTelemetry Collector Prometheus endpoint
  - name: OTel Collector
    type: prometheus
    access: proxy
    url: http://otel-collector:8889
    isDefault: false
    jsonData:
      timeInterval: 10s
      queryTimeout: 60s
      httpMethod: POST
    editable: true
    version: 1
