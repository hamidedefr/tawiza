receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "*"
          allowed_headers:
            - "*"

  # Prometheus receiver for scraping metrics
  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-collector'
          scrape_interval: 10s
          static_configs:
            - targets: ['localhost:8888']

processors:
  # Batch processor - recommended for performance
  batch:
    timeout: 10s
    send_batch_size: 1024
    send_batch_max_size: 2048

  # Memory limiter to prevent OOM
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  # Resource processor to add custom attributes
  resource:
    attributes:
      - key: service.namespace
        value: tajine
        action: upsert
      - key: deployment.environment
        value: development
        action: upsert

  # Resource detection for host/environment metadata
  # NOTE: docker detector removed due to socket permission issues in LXC
  resourcedetection:
    detectors: [env, system]
    timeout: 5s
    override: false

  # Attributes processor for custom transformations
  attributes:
    actions:
      - key: tajine.component
        action: insert
        from_attribute: service.name
      - key: drop_label
        action: delete

exporters:
  # Prometheus exporter
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: tajine
    const_labels:
      environment: development
      cluster: tajine-dev
    resource_to_telemetry_conversion:
      enabled: true

  # Prometheus Remote Write exporter
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true

  # Loki HTTP exporter for logs (using otlphttp)
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  # OTLP exporter (for forwarding to other collectors if needed)
  otlp:
    endpoint: localhost:4317
    tls:
      insecure: true

  # Debug exporter for troubleshooting (replaces deprecated 'logging')
  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: :13133
  pprof:
    endpoint: :1777
  zpages:
    endpoint: :55679

service:
  extensions: [health_check, pprof, zpages]

  pipelines:
    # Traces pipeline
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, resource, batch]
      exporters: [debug]

    # Metrics pipeline
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, resourcedetection, resource, batch]
      exporters: [prometheus, prometheusremotewrite]

    # Logs pipeline
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, resource, attributes, batch]
      exporters: [otlphttp/loki, debug]

  telemetry:
    logs:
      level: info
      encoding: json
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: "0.0.0.0"
                port: 8888
