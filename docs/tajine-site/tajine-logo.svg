<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Steam wisps -->
  <g class="steam" opacity="0.6">
    <path d="M50 8 Q53 5, 50 2 Q47 5, 50 8" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M44 12 Q47 8, 44 4" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M56 12 Q53 8, 56 4" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Lid handle (knob) -->
  <ellipse cx="50" cy="15" rx="4" ry="3" fill="currentColor"/>

  <!-- Conical lid -->
  <path d="M50 18 L78 58 Q80 62, 76 64 L24 64 Q20 62, 22 58 L50 18Z"
        fill="currentColor" opacity="0.2"/>
  <path d="M50 18 L78 58 Q80 62, 76 64 L24 64 Q20 62, 22 58 L50 18Z"
        stroke="currentColor" stroke-width="2" fill="none"/>

  <!-- Decorative band on lid -->
  <path d="M32 50 Q50 48, 68 50" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M28 56 Q50 54, 72 56" stroke="currentColor" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Geometric moroccan pattern on lid -->
  <g opacity="0.3">
    <path d="M50 28 L54 34 L50 40 L46 34 Z" fill="currentColor"/>
    <path d="M42 38 L46 44 L42 50 L38 44 Z" fill="currentColor"/>
    <path d="M58 38 L62 44 L58 50 L54 44 Z" fill="currentColor"/>
  </g>

  <!-- Base plate -->
  <ellipse cx="50" cy="68" rx="35" ry="8" fill="currentColor" opacity="0.15"/>
  <ellipse cx="50" cy="68" rx="35" ry="8" stroke="currentColor" stroke-width="2" fill="none"/>

  <!-- Base rim highlight -->
  <path d="M18 72 Q50 80, 82 72" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Bottom shadow -->
  <ellipse cx="50" cy="78" rx="30" ry="5" fill="currentColor" opacity="0.1"/>

  <!-- Decorative dots on base -->
  <g opacity="0.4">
    <circle cx="30" cy="68" r="1.5" fill="currentColor"/>
    <circle cx="50" cy="70" r="1.5" fill="currentColor"/>
    <circle cx="70" cy="68" r="1.5" fill="currentColor"/>
  </g>
</svg>
