version: '3.8'

services:
  # PostgreSQL - Main database
  postgres:
    image: postgres:15
    container_name: mptoo-postgres
    environment:
      POSTGRES_USER: mptoo
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-mptoo_password}
      POSTGRES_DB: mptoo
      POSTGRES_HOST_AUTH_METHOD: md5
    command: postgres -c listen_addresses='*'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mptoo -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mptoo-network

  # Redis - Cache and message queue
  redis:
    image: redis:7-alpine
    container_name: mptoo-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mptoo-network

  # MinIO - S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: mptoo-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9002:9000"  # Changed from 9000 to 9002 (Portainer uses 9000)
      - "127.0.0.1:9003:9001"  # Console port
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - mptoo-network

  # MLflow - Experiment tracking and model registry
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mptoo-mlflow
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://mptoo:${DATABASE_PASSWORD:-mptoo_password}@postgres:5432/mptoo
      --default-artifact-root s3://mlflow-artifacts
    ports:
      - "5001:5000"  # Changed from 5000 to 5001 (port conflict)
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - mptoo-network

  # Label Studio - Data annotation
  label-studio:
    image: heartexlabs/label-studio:1.13.1
    container_name: mptoo-label-studio
    environment:
      LABEL_STUDIO_HOST: http://localhost:8082
      LABEL_STUDIO_BASE_DATA_DIR: /label-studio/data
      CSRF_TRUSTED_ORIGINS: http://localhost:8090,http://localhost:8082
      DJANGO_DB: default
      POSTGRE_NAME: labelstudio
      POSTGRE_USER: labelstudio
      POSTGRE_PASSWORD: ${LABELSTUDIO_PASSWORD:-labelstudio_password}
      POSTGRE_PORT: 5432
      POSTGRE_HOST: postgres
      DEBUG: "true"
    ports:
      - "8082:8080"
    volumes:
      - label_studio_data:/label-studio/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mptoo-network

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: mptoo-prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - mptoo-network

  # Grafana - Metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: mptoo-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_SERVER_ROOT_URL: http://localhost:3003
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3003:3000"  # Port 3003: evite conflit avec Next.js frontend (3000)
    depends_on:
      - prometheus
    networks:
      - mptoo-network

  # Prefect Server - Workflow orchestration (optional)
  prefect:
    image: prefecthq/prefect:2-latest
    container_name: mptoo-prefect
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://mptoo:${DATABASE_PASSWORD:-mptoo_password}@postgres:5432/prefect
      PREFECT_SERVER_API_HOST: 0.0.0.0
    ports:
      - "4200:4200"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mptoo-network

  # Chroma DB - Vector database for embeddings
  chromadb:
    image: chromadb/chroma:latest
    container_name: mptoo-chromadb
    privileged: true
    environment:
      CHROMA_SERVER_AUTH_PROVIDER: ${CHROMA_AUTH_PROVIDER:-token}
      CHROMA_SERVER_AUTH_CREDENTIALS: ${CHROMA_AUTH_TOKEN:-default-token}
      ALLOW_RESET: "true"
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    networks:
      - mptoo-network

  # Skyvern - AI-powered web automation
  skyvern:
    image: skyvern/skyvern:latest
    container_name: mptoo-skyvern
    environment:
      DATABASE_URL: postgresql://mptoo:${DATABASE_PASSWORD:-mptoo_password}@postgres:5432/skyvern
      REDIS_URL: redis://redis:6379/1
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mptoo-network

  # MPtoO API (commented out - build locally first)
  # api:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: mptoo-api
  #   environment:
  #     DATABASE_URL: postgresql+asyncpg://mptoo:${DATABASE_PASSWORD:-mptoo_password}@postgres:5432/mptoo
  #     REDIS_URL: redis://redis:6379/0
  #     MLFLOW_TRACKING_URI: http://mlflow:5000
  #     LABEL_STUDIO_URL: http://label-studio:8080
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #     mlflow:
  #       condition: service_started
  #   networks:
  #     - mptoo-network
  #   volumes:
  #     - ./src:/app/src

volumes:
  postgres_data:
  redis_data:
  minio_data:
  label_studio_data:
  prometheus_data:
  grafana_data:
  chromadb_data:

networks:
  mptoo-network:
    driver: bridge
