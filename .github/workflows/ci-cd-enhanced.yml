name: CI/CD Enhanced Pipeline

on:
  push:
    branches: [main, mvp-local, develop]
  pull_request:
    branches: [main]
  schedule:
    # Weekly dependency check
    - cron: '0 0 * * 0'

env:
  PYTHON_VERSION: '3.13'
  UV_VERSION: '0.5.0'
  RUFF_VERSION: '0.8.0'

jobs:
  # Fast quality checks using uv and ruff (Phase 1 tools)
  quality:
    name: Code Quality (uv + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # For better git-based analysis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv (10-100x faster than pip)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies with uv
        run: |
          uv venv venv
          source venv/bin/activate
          uv pip install -r requirements.txt
          uv pip install ruff mypy bandit safety

      - name: Run ruff linting
        run: |
          source venv/bin/activate
          ruff check src/ --output-format=github
        continue-on-error: true

      - name: Run ruff formatting check
        run: |
          source venv/bin/activate
          ruff format --check src/
        continue-on-error: true

      - name: Run mypy type checking
        run: |
          source venv/bin/activate
          mypy src/ --ignore-missing-imports --no-error-summary
        continue-on-error: true

      - name: Run bandit security scan
        run: |
          source venv/bin/activate
          bandit -r src/ -f json -o bandit-report.json
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-reports
          path: |
            bandit-report.json
          retention-days: 30

  # Comprehensive testing with PostgreSQL + Redis + pgvector
  test:
    name: Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.13']

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: mptoo
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: mptoo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install pgvector extension
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          # Note: pgvector would need to be in the postgres service container
          # For testing, we'll use mock data or skip vector tests

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            venv
          key: ${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          uv venv venv
          source venv/bin/activate
          uv pip install -r requirements.txt
          uv pip install pytest pytest-asyncio pytest-cov pytest-mock pytest-httpx httpx

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE__URL: postgresql+asyncpg://mptoo:test_password@localhost:5432/mptoo_test
          REDIS__URL: redis://localhost:6379/0
          VECTORDB__ENABLED: false  # Disable for CI
          OLLAMA__BASE_URL: http://localhost:11434  # Won't actually connect
        run: |
          source venv/bin/activate
          pytest tests/ -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            -m "not integration and not slow" \
            --ignore=tests/integration/ \
            || true  # Don't fail build yet

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.13'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            htmlcov/
            coverage.xml
          retention-days: 30

  # Performance benchmarks (Phase 1-3 validation)
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv venv venv
          source venv/bin/activate
          uv pip install -r requirements.txt

      - name: Run baseline benchmarks
        run: |
          source venv/bin/activate
          python scripts/baseline_benchmark.py || true
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: |
            benchmark-*.json
            benchmark-*.txt
          retention-days: 90

  # Docker build with multi-stage optimization
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [quality, test]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: mptoo-api
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mptoo-api:${{ github.ref_name }}-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

      - name: Save Docker image
        run: |
          docker save mptoo-api:${{ github.ref_name }}-${{ github.sha }} | gzip > mptoo-api.tar.gz

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ github.ref_name }}
          path: mptoo-api.tar.gz
          retention-days: 7

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # Dependency security and updates
  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Check for dependency vulnerabilities
        run: |
          uv venv venv
          source venv/bin/activate
          uv pip install safety pip-audit

          # Safety check
          safety check --json --output safety-report.json || true

          # pip-audit check
          pip-audit --format json --output pip-audit-report.json || true
        continue-on-error: true

      - name: Upload dependency reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-reports
          path: |
            safety-report.json
            pip-audit-report.json
          retention-days: 30

      - name: Create issue for vulnerabilities
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 🚨 Security Vulnerabilities Detected\n\n';

            try {
              const safetyReport = JSON.parse(fs.readFileSync('safety-report.json', 'utf8'));
              if (safetyReport.vulnerabilities && safetyReport.vulnerabilities.length > 0) {
                body += '### Safety Report\n\n';
                body += `Found ${safetyReport.vulnerabilities.length} vulnerabilities:\n\n`;
                safetyReport.vulnerabilities.slice(0, 5).forEach(vuln => {
                  body += `- **${vuln.package}** ${vuln.installed_version}: ${vuln.vulnerability_id}\n`;
                });
              }
            } catch (e) {
              body += 'Could not parse safety report.\n\n';
            }

            body += '\n**Action Required**: Review and update dependencies.\n';
            body += `\nTriggered by: ${context.eventName} on ${context.ref}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Security vulnerabilities in dependencies',
              body: body,
              labels: ['security', 'dependencies']
            });

  # Notification on completion
  notify:
    name: Notify Build Status
    runs-on: ubuntu-latest
    needs: [quality, test, build]
    if: always()

    steps:
      - name: Check job status
        id: check
        run: |
          if [ "${{ needs.quality.result }}" == "failure" ] || \
             [ "${{ needs.test.result }}" == "failure" ] || \
             [ "${{ needs.build.result }}" == "failure" ]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: Create summary
        run: |
          echo "## 🚀 CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Results" >> $GITHUB_STEP_SUMMARY
          echo "- Quality: ${{ needs.quality.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall Status**: ${{ steps.check.outputs.status }}" >> $GITHUB_STEP_SUMMARY
