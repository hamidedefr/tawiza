name: Automated Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: |
          uv venv venv
          source venv/bin/activate
          uv pip install -r requirements.txt

      - name: Generate changelog
        id: changelog
        run: |
          # Install conventional changelog
          npm install -g conventional-changelog-cli

          # Generate changelog
          conventional-changelog -p angular -i CHANGELOG.md -s

          echo "Changelog generated"

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        with:
          semantic_version: 19
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            conventional-changelog-conventionalcommits

      - name: Create release notes
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          ## 🎉 MPtoO v${{ steps.semantic.outputs.new_release_version }}

          ### What's Changed

          ${{ steps.semantic.outputs.new_release_notes }}

          ### 📦 Installation

          ```bash
          # Clone repository
          git clone https://github.com/${{ github.repository }}.git
          cd MPtoO-V2

          # Quick setup (automated)
          ./scripts/setup-dev-environment.sh

          # Or manual setup
          curl -LsSf https://astral.sh/uv/install.sh | sh
          uv venv venv
          source venv/bin/activate
          uv pip install -r requirements.txt
          ```

          ### 🚀 Quick Start

          ```bash
          # Start the API
          uvicorn src.interfaces.api.main:app --reload --host 0.0.0.0 --port 8000

          # Visit documentation
          open http://localhost:8000/docs
          ```

          ### 📚 Documentation

          - [Full Documentation](https://github.com/${{ github.repository }}/blob/main/README.md)
          - [API Documentation](http://localhost:8000/docs)
          - [Migration Guide](https://github.com/${{ github.repository }}/blob/main/MIGRATION_PLAN_AMD_SELFHOSTED.md)

          ---

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/v${{ steps.semantic.outputs.last_release_version }}...v${{ steps.semantic.outputs.new_release_version }}
          EOF

      - name: Upload release notes
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  # Build and publish Docker image on release (to GitHub Container Registry)
  docker:
    name: Build & Publish Docker Image
    needs: release
    runs-on: ubuntu-latest
    if: needs.release.outputs.new_release_published == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/mptoo-api
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.new_release_version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.new_release_version }}
            type=semver,pattern={{major}},value=${{ needs.release.outputs.new_release_version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VCS_REF=${{ github.sha }}
            VERSION=${{ needs.release.outputs.new_release_version }}

  # Update documentation
  docs:
    name: Update Documentation
    needs: release
    runs-on: ubuntu-latest
    if: needs.release.outputs.new_release_published == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv venv venv
          source venv/bin/activate
          uv pip install mkdocs mkdocs-material

      - name: Generate API docs
        run: |
          source venv/bin/activate
          # Generate OpenAPI schema
          python -c "from src.interfaces.api.main import app; import json; print(json.dumps(app.openapi(), indent=2))" > docs/openapi.json
        continue-on-error: true

      - name: Build documentation
        run: |
          source venv/bin/activate
          # If mkdocs.yml exists
          if [ -f "mkdocs.yml" ]; then
            mkdocs build
          fi
        continue-on-error: true

  # Notify about release
  notify:
    name: Notify Release
    needs: [release, docker, docs]
    runs-on: ubuntu-latest
    if: needs.release.outputs.new_release_published == 'true'

    steps:
      - name: Create release summary
        run: |
          echo "## 🎉 New Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: v${{ needs.release.outputs.new_release_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Docker image pushed: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Documentation updated: ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Links" >> $GITHUB_STEP_SUMMARY
          echo "- [Release](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.release.outputs.new_release_version }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Changelog](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)" >> $GITHUB_STEP_SUMMARY
