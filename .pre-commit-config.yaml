# Pre-commit hooks for MPtoO v2.0.3
# Optimized for Python 3.13 + uv + ruff (Phase 1 tools)
#
# Installation:
#   pip install pre-commit  # or: uv pip install pre-commit
#   pre-commit install
#   pre-commit install --hook-type commit-msg
#
# Run manually:
#   pre-commit run --all-files

repos:
  # Ruff - Ultra-fast Python linting and formatting (Phase 1)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.5
    hooks:
      - id: ruff
        name: Ruff linting
        args: [--fix, --exit-non-zero-on-fix, --show-fixes]
        types_or: [python, pyi]

      - id: ruff-format
        name: Ruff formatting
        types_or: [python, pyi]

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace

      - id: end-of-file-fixer
        name: Fix end of files

      - id: check-yaml
        name: Check YAML syntax

      - id: check-json
        name: Check JSON syntax

      - id: check-toml
        name: Check TOML syntax

      - id: check-added-large-files
        name: Check for large files
        args: ['--maxkb=1000']

      - id: check-case-conflict
        name: Check for case conflicts

      - id: check-merge-conflict
        name: Check for merge conflicts

      - id: detect-private-key
        name: Detect private keys

      - id: mixed-line-ending
        name: Fix mixed line endings
        args: [--fix=lf]

      - id: debug-statements
        name: Check for debugger imports

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        name: Bandit security checks
        args: ['-ll']
        exclude: 'tests/'

  # Commit message linting (Conventional Commits)
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.18.0
    hooks:
      - id: commitlint
        name: Commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']

  # Local custom hooks
  - repo: local
    hooks:
      # Check for print statements (use logging instead)
      - id: check-print-statements
        name: Check for print statements
        entry: 'print\('
        language: pygrep
        types: [python]
        exclude: '(scripts/|tests/|examples/|demo_)'

      # Check for pdb/breakpoint
      - id: check-debugger
        name: Check for debugger statements
        entry: '(import pdb|pdb\.set_trace\(\)|breakpoint\(\))'
        language: pygrep
        types: [python]
        exclude: 'tests/'

      # Check for hardcoded credentials
      - id: check-credentials
        name: Check for hardcoded credentials
        entry: "(aws_access_key|aws_secret_access_key|api_key.*=.*[\"'][^\"']{20}|password\\s*=\\s*[\"'][^\"']+[\"'])"
        language: pygrep
        types: [python]
        exclude: '(tests/|\.env\.example|settings\.py)'

# Configuration for pre-commit.ci (if enabled)
ci:
  autofix_commit_msg: '[pre-commit.ci] auto fixes'
  autofix_prs: true
  autoupdate_schedule: weekly
  skip: []
  submodules: false
