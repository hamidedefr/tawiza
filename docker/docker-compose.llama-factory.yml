# Docker Compose for LLaMA-Factory WebUI + Label Studio
# Fine-tuning workflow complet pour MPtoO

services:
  # LLaMA-Factory avec WebUI (ROCm build for AMD GPU)
  llama-factory:
    build:
      context: ..
      dockerfile: docker/Dockerfile.llama-factory
    image: mptoo-llama-factory:rocm
    container_name: llama-factory

    # GPU access for AMD ROCm
    devices:
      - /dev/kfd
      - /dev/dri

    # Security options for GPU access
    security_opt:
      - seccomp:unconfined

    # Run as privileged for full GPU access
    privileged: true

    # Group access for GPU
    group_add:
      - "44"    # video group
      - "993"   # render group

    # IPC mode for shared memory (needed for PyTorch)
    ipc: host

    # Environment variables for AMD GPU
    environment:
      - ROCM_PATH=/opt/rocm
      - HIP_PLATFORM=amd
      - HSA_OVERRIDE_GFX_VERSION=11.0.0
      - PYTORCH_ROCM_ARCH=gfx1100
      - HIP_VISIBLE_DEVICES=0
      - PYTHONUNBUFFERED=1
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
      - USE_MODELSCOPE_HUB=0

    # Ports
    ports:
      - "7860:7860"   # LLaMA-Factory WebUI
      - "6006:6006"   # TensorBoard

    # Volume mounts - map datasets to LLaMA-Factory data directory
    volumes:
      - ../datasets:/app/data/mptoo
      - ../configs:/app/configs
      - ../output:/app/saves
      - ./models:/app/models
      - ./training_logs:/app/logs
      - llama-factory-cache:/root/.cache/huggingface

    # Working directory
    working_dir: /app

    # Start WebUI
    command: ["llamafactory-cli", "webui"]

    # Keep container running
    tty: true
    stdin_open: true

    # Restart policy
    restart: unless-stopped

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Label Studio (already running, but included for completeness)
  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: label-studio
    ports:
      - "8085:8080"
    volumes:
      - label-studio-data:/label-studio/data
      - ../datasets:/label-studio/datasets
    environment:
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/label-studio/datasets
    restart: unless-stopped

volumes:
  llama-factory-cache:
  label-studio-data:
