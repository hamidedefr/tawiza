# Docker Compose for MPtoO ROCm 7.1 Training

services:
  mptoo-training:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rocm-training
    image: mptoo-rocm-training:latest
    container_name: mptoo-training-rocm

    # GPU access for AMD
    devices:
      - /dev/kfd
      - /dev/dri

    # Security options for GPU access
    security_opt:
      - seccomp:unconfined

    # Group access for GPU (using GIDs for compatibility)
    group_add:
      - "44"    # video group
      - "993"   # render group

    # Environment variables
    environment:
      - ROCM_PATH=/opt/rocm
      - HIP_PLATFORM=amd
      - HSA_OVERRIDE_GFX_VERSION=11.0.0
      - PYTORCH_ROCM_ARCH=gfx1100
      - HIP_VISIBLE_DEVICES=0
      - PYTHONUNBUFFERED=1

    # Volume mounts
    volumes:
      - ../datasets:/workspace/datasets
      - ../configs:/workspace/configs
      - ../output:/workspace/output
      - ../scripts:/workspace/scripts
      - ./training_logs:/workspace/logs

    # Network mode
    network_mode: host

    # Working directory
    working_dir: /workspace

    # Keep container running
    tty: true
    stdin_open: true

    # Resource limits (optional)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: amd
    #           count: 1
    #           capabilities: [gpu]
