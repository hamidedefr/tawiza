version: '3.8'

# ====================
# Networks
# ====================

networks:
  frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

  backend:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.1.0/24

  sandbox-isolated:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.2.0/24
    driver_opts:
      com.docker.network.bridge.enable_icc: "false"

# ====================
# Volumes
# ====================

volumes:
  openmanus-data:
  redis-data:
  browser-cache:
  browser-profiles:
  sandbox-storage:
  monitoring-data:
  minio-data:
  ollama-models:
  postgres-data:

# ====================
# Services
# ====================

services:
  # ==========================================
  # FRONTEND - Reflex Dashboard (Pure Python)
  # ==========================================
  reflex-dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.reflex
    container_name: openmanus-reflex
    hostname: reflex-dashboard

    ports:
      - "3001:3001"  # Frontend
      - "8004:8001"  # Backend API Reflex - Port 8004: evite conflit avec ChromaDB (8001)

    environment:
      - REFLEX_ENV=production
      - BACKEND_URL=http://openmanus-core:8085

    networks:
      - frontend

    depends_on:
      - openmanus-core

    restart: unless-stopped

  # ==========================================
  # BACKEND CORE - FastAPI OpenManus API
  # ==========================================
  openmanus-core:
    build:
      context: ..
      dockerfile: docker/Dockerfile.openmanus-core
    container_name: openmanus-core
    hostname: openmanus-core

    resources:
      limits:
        cpus: '4.0'
        memory: 8G
      reservations:
        cpus: '2.0'
        memory: 4G

    environment:
      - WORKERS=4
      - MAX_CONCURRENT_TASKS=50
      - TASK_TIMEOUT=300
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_URL=http://ollama:11434
      - DATABASE_URL=postgresql://openmanus:openmanus2025@postgres:5432/openmanus

    ports:
      - "8085:8085"

    networks:
      - frontend
      - backend

    volumes:
      - openmanus-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    depends_on:
      - redis
      - postgres

    restart: unless-stopped

  # ==========================================
  # AI INTELLIGENCE - Ollama (LLM + Vision)
  # ==========================================
  ollama:
    image: ollama/ollama:latest
    container_name: openmanus-ollama
    hostname: ollama

    ports:
      - "11434:11434"

    volumes:
      - ollama-models:/root/.ollama

    # Uncomment for GPU support (AMD ROCm)
    # devices:
    #   - /dev/kfd:/dev/kfd
    #   - /dev/dri:/dev/dri
    # environment:
    #   - HSA_OVERRIDE_GFX_VERSION=11.0.0
    #   - OLLAMA_GPU=rocm

    networks:
      - backend

    # Pull models on startup
    command: >
      bash -c "
      ollama serve &
      sleep 10 &&
      ollama pull qwen2.5-coder:7b &&
      ollama pull llava:7b &&
      wait
      "

    restart: unless-stopped

  # ==========================================
  # DATABASE - PostgreSQL
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: openmanus-postgres
    hostname: postgres

    environment:
      - POSTGRES_USER=openmanus
      - POSTGRES_PASSWORD=openmanus2025
      - POSTGRES_DB=openmanus

    volumes:
      - postgres-data:/var/lib/postgresql/data

    networks:
      - backend

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmanus"]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped

  # ==========================================
  # CACHE & QUEUE - Redis
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: openmanus-redis
    hostname: redis

    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --save 60 1000

    resources:
      limits:
        cpus: '1.0'
        memory: 2G

    networks:
      - backend

    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

    restart: unless-stopped

  # ==========================================
  # BROWSER POOL - Playwright
  # ==========================================
  browser-pool:
    image: mcr.microsoft.com/playwright/python:v1.40.0-jammy
    container_name: openmanus-browsers
    hostname: browser-pool

    command: >
      bash -c "
      pip install playwright fastapi uvicorn &&
      python -m playwright install chromium &&
      echo 'Browser pool service starting...' &&
      sleep infinity
      "

    resources:
      limits:
        cpus: '4.0'
        memory: 8G

    shm_size: '2gb'

    environment:
      - POOL_SIZE=10
      - MAX_BROWSERS=50
      - BROWSER_TIMEOUT=300

    networks:
      - backend

    volumes:
      - browser-cache:/cache
      - browser-profiles:/profiles

    restart: unless-stopped

  # ==========================================
  # MONITORING - Grafana
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: openmanus-grafana
    hostname: grafana

    resources:
      limits:
        cpus: '1.0'
        memory: 2G

    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=openmanus2025
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_HTTP_PORT=3000

    ports:
      - "3003:3000"  # Port 3003: evite conflit avec Next.js frontend (3000)

    networks:
      - backend
      - frontend

    volumes:
      - monitoring-data:/var/lib/grafana

    restart: unless-stopped

  # ==========================================
  # STORAGE - MinIO (S3-compatible)
  # ==========================================
  minio:
    image: minio/minio:latest
    container_name: openmanus-minio
    hostname: minio

    command: server /data --console-address ":9001"

    resources:
      limits:
        cpus: '1.0'
        memory: 2G

    environment:
      - MINIO_ROOT_USER=openmanus
      - MINIO_ROOT_PASSWORD=openmanus2025

    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console

    networks:
      - backend
      - frontend

    volumes:
      - minio-data:/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

    restart: unless-stopped

  # ==========================================
  # METRICS - Prometheus (Optionnel)
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: openmanus-prometheus
    hostname: prometheus

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

    ports:
      - "9090:9090"

    networks:
      - backend

    restart: unless-stopped
